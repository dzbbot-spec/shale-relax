name: Deploy mini-app to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'mini-app/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mini-app/package-lock.json

      - name: Install dependencies
        working-directory: mini-app
        run: npm ci

      - name: Build
        working-directory: mini-app
        run: npm run build
        env:
          GITHUB_ACTIONS: true
          VITE_API_URL: https://worker-production-8fd9.up.railway.app

      - uses: actions/upload-pages-artifact@v3
        with:
          path: mini-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
